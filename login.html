<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookSuite – Login</title>
    <link rel="stylesheet" href="styles.css" />

    <style>
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid white;
        border-top: 2px solid transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        display: none;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .remember-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 10px 0;
        font-size: 13px;
      }

      .auth-btn {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        transition: 0.2s ease;
      }

      .auth-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .error-message {
        font-size: 13px;
        text-align: center;
        margin-top: 10px;
        min-height: 18px;
      }

      @keyframes shake {
        0% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        50% { transform: translateX(6px); }
        75% { transform: translateX(-6px); }
        100% { transform: translateX(0); }
      }

      .shake {
        animation: shake 0.3s ease;
      }

      @keyframes successGlow {
        0% { box-shadow: 0 0 0px rgba(34,197,94,0); }
        50% { box-shadow: 0 0 18px rgba(34,197,94,0.6); }
        100% { box-shadow: 0 0 0px rgba(34,197,94,0); }
      }

      .success {
        animation: successGlow 0.8s ease;
      }

      .password-wrap {
        position: relative;
      }

      .toggle-password {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 12px;
        cursor: pointer;
        color: #555;
      }
    </style>
  </head>

  <body>
    <header class="top-bar">
      <img src="assets/booksuite-logo.PNG" class="logo small" />
    </header>

    <main class="auth-page">
      <div class="auth-card" id="authCard">
        <h2>Login to your portal</h2>

        <form id="loginForm">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@company.com" required />

          <label>Password</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="••••••••" required />
            <span class="toggle-password" id="togglePassword">Show</span>
          </div>

          <div class="remember-wrap">
            <input type="checkbox" id="rememberMe" />
            <label for="rememberMe">Remember me</label>
          </div>

          <button class="btn primary auth-btn" id="loginBtn">
            <div class="spinner" id="spinner"></div>
            <span id="btnText">Login to portal</span>
          </button>

          <p class="error-message" id="errorMessage"></p>
        </form>
      </div>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBT_QHFaROmtmQQy4984zjJ7Xmust7TOho",
        authDomain: "booksuite-dtb.firebaseapp.com",
        projectId: "booksuite-dtb",
        storageBucket: "booksuite-dtb.firebasestorage.app",
        messagingSenderId: "587821555081",
        appId: "1:587821555081:web:e588609eedd6c924cdd558"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      const form = document.getElementById("loginForm");
      const loginBtn = document.getElementById("loginBtn");
      const spinner = document.getElementById("spinner");
      const btnText = document.getElementById("btnText");
      const errorMessage = document.getElementById("errorMessage");
      const authCard = document.getElementById("authCard");

      document.getElementById("togglePassword").addEventListener("click", () => {
        const passwordInput = document.getElementById("password");
        passwordInput.type = passwordInput.type === "password" ? "text" : "password";
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        loginBtn.disabled = true;
        spinner.style.display = "block";
        btnText.textContent = "Logging in...";

        try {
          await signInWithEmailAndPassword(auth, email, password);

          authCard.classList.add("success");

          setTimeout(() => {
            window.location.href = "portal.html";
          }, 800);

        } catch (error) {
          spinner.style.display = "none";
          btnText.textContent = "Login to portal";
          loginBtn.disabled = false;

          authCard.classList.add("shake");
          setTimeout(() => authCard.classList.remove("shake"), 300);

          errorMessage.style.color = "red";
          errorMessage.textContent = "Invalid email or password.";
        }
      });
    </script>
  </body>
</html>
