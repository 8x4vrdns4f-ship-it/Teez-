<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookSuite – Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header class="top-bar">
      <img src="assets/booksuite-logo.PNG" class="logo small" />
    </header>

    <main class="auth-page">
      <div class="auth-card">
        <h2>Login to your portal</h2>

        <form id="login-form">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@company.com" required />

          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required />

          <label>Business Code</label>
          <input type="text" placeholder="BS-XXXXXX" />

          <button class="btn primary auth-btn" type="submit">
            Login to portal
          </button>
        </form>
      </div>
    </main>

    <!-- FIREBASE AUTH -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBT_QHFaROmtmQQy4984zjJ7Xmust7TOho",
        authDomain: "booksuite-dtb.firebaseapp.com",
        projectId: "booksuite-dtb",
        storageBucket: "booksuite-dtb.firebasestorage.app",
        messagingSenderId: "587821555081",
        appId: "1:587821555081:web:e588609eedd6c924cdd558"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      const form = document.getElementById("login-form");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        signInWithEmailAndPassword(auth, email, password)
          .then(() => {
            window.location.href = "portal.html";
          })
          .catch((error) => {
            alert("Login failed: " + error.message);
          });
      });
    </script>
  </body>
</html>
