<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookSuite – Login</title>
    <link rel="stylesheet" href="styles.css" />

    <style>
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid white;
        border-top: 2px solid transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        display: none;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .remember-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 10px 0;
        font-size: 13px;
      }

      .auth-btn {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        transition: 0.2s ease;
      }

      .auth-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .error-message {
        font-size: 13px;
        text-align: center;
        margin-top: 10px;
        min-height: 18px;
      }

      /* Shake animation */
      @keyframes shake {
        0% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        50% { transform: translateX(6px); }
        75% { transform: translateX(-6px); }
        100% { transform: translateX(0); }
      }

      .shake {
        animation: shake 0.3s ease;
      }

      /* Success animation */
      @keyframes successGlow {
        0% { box-shadow: 0 0 0px rgba(34,197,94,0); }
        50% { box-shadow: 0 0 18px rgba(34,197,94,0.6); }
        100% { box-shadow: 0 0 0px rgba(34,197,94,0); }
      }

      .success {
        animation: successGlow 0.8s ease;
      }

      /* Show password toggle */
      .password-wrap {
        position: relative;
      }

      .toggle-password {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 12px;
        cursor: pointer;
        color: #555;
      }

      /* Format popup */
      .format-popup {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #111827;
        color: white;
        padding: 14px 18px;
        border-radius: 10px;
        font-size: 13px;
        opacity: 0;
        transform: translateY(20px);
        transition: 0.3s ease;
      }

      .format-popup.show {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>

  <body>
    <header class="top-bar">
      <img src="assets/booksuite-logo.PNG" class="logo small" />
    </header>

    <main class="auth-page">
      <div class="auth-card" id="authCard">
        <h2>Login to your portal</h2>

        <form id="loginForm">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@company.com" required />

          <label>Password</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="••••••••" required />
            <span class="toggle-password" id="togglePassword">Show</span>
          </div>

          <label>Business Code</label>
          <input type="text" id="businessCode" placeholder="BS-XXXXXXXX" maxlength="11" required />

          <div class="remember-wrap">
            <input type="checkbox" id="rememberMe" />
            <label for="rememberMe">Remember me</label>
          </div>

          <button class="btn primary auth-btn" id="loginBtn" disabled>
            <div class="spinner" id="spinner"></div>
            <span id="btnText">Login to portal</span>
          </button>

          <p class="error-message" id="errorMessage"></p>
        </form>
      </div>
    </main>

    <div class="format-popup" id="formatPopup">
      Password: 6+ characters & 1 capital letter.<br>
      Code: BS-XXXXXXXX (8 numbers).
    </div>

    <script>
      const form = document.getElementById("loginForm");
      const passwordInput = document.getElementById("password");
      const codeInput = document.getElementById("businessCode");
      const loginBtn = document.getElementById("loginBtn");
      const spinner = document.getElementById("spinner");
      const btnText = document.getElementById("btnText");
      const errorMessage = document.getElementById("errorMessage");
      const authCard = document.getElementById("authCard");
      const togglePassword = document.getElementById("togglePassword");
      const formatPopup = document.getElementById("formatPopup");

      const passwordRegex = /^(?=.*[A-Z]).{6,}$/;
      const codeRegex = /^BS-\d{8}$/;

      function validateForm() {
        loginBtn.disabled = !(
          passwordRegex.test(passwordInput.value) &&
          codeRegex.test(codeInput.value)
        );
      }

      passwordInput.addEventListener("focus", showPopup);
      codeInput.addEventListener("focus", showPopup);

      function showPopup() {
        formatPopup.classList.add("show");
        setTimeout(() => {
          formatPopup.classList.remove("show");
        }, 4000);
      }

      passwordInput.addEventListener("input", validateForm);

      codeInput.addEventListener("input", () => {
        let value = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, "");

        if (!value.startsWith("BS")) {
          value = "BS" + value.replace(/^BS/, "");
        }

        if (value.length > 2) {
          value = value.slice(0, 2) + "-" + value.slice(2);
        }

        codeInput.value = value.slice(0, 11);

        validateForm();
      });

      togglePassword.addEventListener("click", () => {
        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          togglePassword.textContent = "Hide";
        } else {
          passwordInput.type = "password";
          togglePassword.textContent = "Show";
        }
      });

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        if (
          !passwordRegex.test(passwordInput.value) ||
          !codeRegex.test(codeInput.value)
        ) {
          authCard.classList.add("shake");
          setTimeout(() => authCard.classList.remove("shake"), 300);
          errorMessage.style.color = "red";
          errorMessage.textContent = "Invalid format. Please check requirements.";
          return;
        }

        loginBtn.disabled = true;
        spinner.style.display = "block";
        btnText.textContent = "Logging in...";

        setTimeout(() => {
          spinner.style.display = "none";
          btnText.textContent = "Login to portal";
          loginBtn.disabled = false;

          authCard.classList.add("success");
          setTimeout(() => authCard.classList.remove("success"), 800);

          errorMessage.style.color = "green";
          errorMessage.textContent = "Login successful (demo mode).";

          setTimeout(() => {
            window.location.href = "portal.html";
          }, 900);
        }, 1200);
      });
    </script>
  </body>
</html>
