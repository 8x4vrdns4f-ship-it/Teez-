<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sign Up – BookSuite</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<main class="auth-page">
  <div class="auth-card">

    <h2 class="auth-title">Create Your Account</h2>
    <p class="auth-subtext">Start managing bookings the smart way.</p>

    <form id="signup-form">

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="name" required>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" required>
          <span class="toggle-password" data-target="password">Show</span>
        </div>
        <div id="strength-text"></div>
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" required>
          <span class="toggle-password" data-target="confirmPassword">Show</span>
        </div>
      </div>

      <button type="submit" class="btn primary full-width" id="submitBtn">
        Create Account
      </button>

    </form>

    <div class="success-message" id="success-message">
      Account created successfully 🎉
    </div>

    <div class="auth-footer">
      <p>Already have an account?</p>
      <a href="login.html" class="btn secondary full-width" style="margin-top:10px; display:block; text-align:center;">
        Log In
      </a>
    </div>

  </div>
</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBT_QHFaROmtmQQy4984zjJ7Xmust7TOho",
  authDomain: "booksuite-dtb.firebaseapp.com",
  projectId: "booksuite-dtb",
  storageBucket: "booksuite-dtb.firebasestorage.app",
  messagingSenderId: "587821555081",
  appId: "1:587821555081:web:e588609eedd6c924cdd558"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function generateCompanyCode() {
  const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let result = "BS-";
  for (let i = 0; i < 6; i++) {
    result += characters.charAt(Math.floor(Math.random() * characters.length));
  }
  return result;
}

const form = document.getElementById("signup-form");
const submitBtn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if (password !== confirmPassword) {
    alert("Passwords do not match");
    return;
  }

  submitBtn.textContent = "Creating...";
  submitBtn.disabled = true;

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    const companyId = crypto.randomUUID();
    const companyCode = generateCompanyCode();

    await setDoc(doc(db, "companies", companyId), {
      ownerId: user.uid,
      companyCode: companyCode,
      createdAt: new Date()
    });

    await setDoc(doc(db, "users", user.uid), {
      name: name,
      email: email,
      companyId: companyId,
      role: "owner"
    });

    alert("Your company code is: " + companyCode);

    window.location.href = "portal.html";

  } catch (error) {
    alert(error.message);
    submitBtn.textContent = "Create Account";
    submitBtn.disabled = false;
  }
});

</script>

</body>
</html>
