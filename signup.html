<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sign Up – BookSuite</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<style>
  .password-rules {
    margin-top: 8px;
    font-size: 12px;
    line-height: 1.8;
  }
  .password-rules li {
    list-style: none;
    padding-left: 4px;
    color: #ff6b6b;
    transition: color 0.2s;
  }
  .password-rules li.met {
    color: #22c55e;
  }
  .password-rules li::before {
    content: '✕ ';
  }
  .password-rules li.met::before {
    content: '✓ ';
  }
  .generate-btn {
    display: inline-block;
    margin-top: 6px;
    padding: 6px 14px;
    font-size: 12px;
    border: 1px solid #5ec2ff;
    background: transparent;
    color: #5ec2ff;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s ease;
  }
  .generate-btn:hover {
    background: #5ec2ff;
    color: #020814;
  }
  .strength-bar-wrap {
    height: 4px;
    background: #1e293b;
    border-radius: 4px;
    margin-top: 8px;
    overflow: hidden;
  }
  .strength-bar {
    height: 100%;
    width: 0%;
    border-radius: 4px;
    transition: width 0.3s, background 0.3s;
  }
  #strength-label {
    font-size: 12px;
    margin-top: 4px;
  }
</style>
</head>

<body>
 <header class="top-bar">
     <a href="index.html"><img src="assets/booksuite-logo.PNG" class="logo "/>  </a> 
    </header>
<main class="auth-page">
  <div class="auth-card">

    <h2 class="auth-title">Create Your Account</h2>
    <p class="auth-subtext">Start managing bookings the smart way.</p>

    <form id="signup-form">

      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="name" required>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" required minlength="8">
          <span class="toggle-password" data-target="password">Show</span>
        </div>
        <div class="strength-bar-wrap"><div class="strength-bar" id="strengthBar"></div></div>
        <div id="strength-label"></div>
        <ul class="password-rules" id="passwordRules">
          <li id="rule-length">At least 8 characters</li>
          <li id="rule-upper">One uppercase letter</li>
          <li id="rule-lower">One lowercase letter</li>
          <li id="rule-number">One number</li>
          <li id="rule-special">One special character (!@#$%...)</li>
        </ul>
        <button type="button" class="generate-btn" id="generateBtn">Generate a strong password for me</button>
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" required>
          <span class="toggle-password" data-target="confirmPassword">Show</span>
        </div>
      </div>

      <button type="submit" class="btn primary full-width" id="submitBtn">
        Create Account
      </button>

    </form>

    <div class="success-message" id="success-message">
      Account created successfully 🎉
    </div>

    <div class="auth-footer">
      <p>Already have an account?</p>
      <a href="login.html" class="btn secondary full-width" style="margin-top:10px; display:block; text-align:center;">
        Log In
      </a>
    </div>

  </div>
</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBT_QHFaROmtmQQy4984zjJ7Xmust7TOho",
  authDomain: "booksuite-dtb.firebaseapp.com",
  projectId: "booksuite-dtb",
  storageBucket: "booksuite-dtb.firebasestorage.app",
  messagingSenderId: "587821555081",
  appId: "1:587821555081:web:e588609eedd6c924cdd558"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function generateCompanyCode() {
  const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let result = "BS-";
  for (let i = 0; i < 6; i++) {
    result += characters.charAt(Math.floor(Math.random() * characters.length));
  }
  return result;
}

document.querySelectorAll(".toggle-password").forEach(toggle => {
  toggle.addEventListener("click", () => {
    const input = document.getElementById(toggle.dataset.target);
    const isHidden = input.type === "password";
    input.type = isHidden ? "text" : "password";
    toggle.textContent = isHidden ? "Hide" : "Show";
  });
});

// Password rules & strength
const passwordInput = document.getElementById("password");
const confirmInput = document.getElementById("confirmPassword");
const strengthBar = document.getElementById("strengthBar");
const strengthLabel = document.getElementById("strength-label");

const rules = {
  length:  { el: document.getElementById("rule-length"),  test: v => v.length >= 8 },
  upper:   { el: document.getElementById("rule-upper"),   test: v => /[A-Z]/.test(v) },
  lower:   { el: document.getElementById("rule-lower"),   test: v => /[a-z]/.test(v) },
  number:  { el: document.getElementById("rule-number"),  test: v => /[0-9]/.test(v) },
  special: { el: document.getElementById("rule-special"), test: v => /[^A-Za-z0-9]/.test(v) },
};

function checkPassword(value) {
  let score = 0;
  for (const key in rules) {
    const passed = rules[key].test(value);
    rules[key].el.classList.toggle("met", passed);
    if (passed) score++;
  }
  const pct = (score / 5) * 100;
  strengthBar.style.width = pct + "%";
  const colors = ["#ff4444", "#ff4444", "#ff9800", "#ffc107", "#8bc34a", "#22c55e"];
  const labels = ["", "Very weak", "Weak", "Fair", "Good", "Strong"];
  strengthBar.style.background = colors[score];
  strengthLabel.textContent = value ? labels[score] : "";
  strengthLabel.style.color = colors[score];
  return score;
}

passwordInput.addEventListener("input", () => checkPassword(passwordInput.value));

// Generate strong password
function generateStrongPassword() {
  const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const lower = "abcdefghijklmnopqrstuvwxyz";
  const digits = "0123456789";
  const specials = "!@#$%^&*()_+-=[]{}";
  const all = upper + lower + digits + specials;
  // Guarantee one of each
  let pw = [
    upper[Math.floor(Math.random() * upper.length)],
    lower[Math.floor(Math.random() * lower.length)],
    digits[Math.floor(Math.random() * digits.length)],
    specials[Math.floor(Math.random() * specials.length)],
  ];
  for (let i = pw.length; i < 16; i++) {
    pw.push(all[Math.floor(Math.random() * all.length)]);
  }
  // Shuffle
  for (let i = pw.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pw[i], pw[j]] = [pw[j], pw[i]];
  }
  return pw.join("");
}

document.getElementById("generateBtn").addEventListener("click", () => {
  const generated = generateStrongPassword();
  passwordInput.value = generated;
  confirmInput.value = generated;
  passwordInput.type = "text";
  confirmInput.type = "text";
  document.querySelectorAll('.toggle-password').forEach(t => t.textContent = 'Hide');
  checkPassword(generated);
});

const form = document.getElementById("signup-form");
const submitBtn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if (password !== confirmPassword) {
    alert("Passwords do not match");
    return;
  }

  if (checkPassword(password) < 5) {
    alert("Please meet all password requirements before continuing.");
    submitBtn.textContent = "Create Account";
    submitBtn.disabled = false;
    return;
  }

  submitBtn.textContent = "Creating...";
  submitBtn.disabled = true;

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    const companyId = crypto.randomUUID();
    const companyCode = generateCompanyCode();

    await setDoc(doc(db, "companies", companyId), {
      ownerId: user.uid,
      companyCode: companyCode,
      createdAt: new Date()
    });

    await setDoc(doc(db, "users", user.uid), {
      name: name,
      email: email,
      companyId: companyId,
      role: "owner"
    });

    alert("Your company code is: " + companyCode);

    window.location.href = "portal.html";

  } catch (error) {
    alert(error.message);
    submitBtn.textContent = "Create Account";
    submitBtn.disabled = false;
  }
});

</script>

</body>
</html>
