<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookSuite – Payments</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
    .page-header h2 { font-size: 28px; }
    .section-body { max-width: 1100px; margin: 0 auto; padding: 40px 48px; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--bs-surface); border: 1px solid var(--bs-border); border-radius: 12px; padding: 20px; }
    .stat-label { font-size: 12px; color: var(--bs-text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--bs-accent); }
    .data-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .data-table th, .data-table td { text-align: left; padding: 14px 16px; border-bottom: 1px solid var(--bs-border); font-size: 14px; }
    .data-table th { color: var(--bs-accent); font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
    .data-table tr:hover { background: var(--bs-card-hover); }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .badge:hover { opacity: 0.8; }
    .badge.paid { background: rgba(34,197,94,0.15); color: #22c55e; }
    .badge.unpaid { background: rgba(255,193,7,0.15); color: #ffc107; }
    .badge.refunded { background: rgba(239,68,68,0.15); color: #ef4444; }
    .search-bar { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--bs-input-border); background: var(--bs-surface); color: var(--bs-text); font-size: 14px; margin-bottom: 20px; box-sizing: border-box; }
    .search-bar:focus { outline: none; border-color: var(--bs-accent); }
    .search-bar::placeholder { color: var(--bs-muted); }
    .add-btn { background: var(--bs-accent); color: var(--bs-bg); border: none; padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .add-btn:hover { background: var(--bs-accent-hover); }
    .action-btns { display: flex; gap: 6px; }
    .action-btns button { background: transparent; border: 1px solid var(--bs-input-border); color: var(--bs-text-secondary); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; }
    .action-btns button:hover { border-color: var(--bs-accent); color: var(--bs-accent); }
    .action-btns button.del:hover { border-color: #ef4444; color: #ef4444; }
    .empty-state { text-align: center; padding: 80px 20px; color: var(--bs-text-secondary); }
    .empty-state .icon { font-size: 56px; margin-bottom: 16px; }
    .empty-state p { font-size: 16px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--bs-modal-bg); border: 1px solid var(--bs-input-border); border-radius: 16px; padding: 32px; width: 90%; max-width: 420px; }
    .modal h3 { margin-bottom: 20px; font-size: 20px; }
    .modal label { display: block; font-size: 13px; color: var(--bs-text-secondary); margin-bottom: 6px; margin-top: 14px; }
    .modal input, .modal select { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--bs-input-border); background: var(--bs-input-bg); color: var(--bs-text); font-size: 14px; box-sizing: border-box; }
    .modal input:focus, .modal select:focus { outline: none; border-color: var(--bs-accent); }
    .modal select option { background: var(--bs-modal-bg); }
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
    .modal-actions button { flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; font-weight: 600; }
    .modal-actions .cancel-btn { background: transparent; border: 1px solid var(--bs-input-border); color: var(--bs-text-secondary); }
    .modal-actions .save-btn { background: var(--bs-accent); color: var(--bs-bg); }
    .toast { position: fixed; bottom: 30px; right: 30px; background: #16a34a; color: #fff; padding: 14px 24px; border-radius: 10px; font-size: 14px; z-index: 200; animation: slideIn 0.3s ease; }
    .toast.error { background: #ef4444; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @media (max-width: 768px) {
      .section-body { padding: 20px 16px; }
      .data-table th:nth-child(2), .data-table td:nth-child(2) { display: none; }
      .data-table th:nth-child(5), .data-table td:nth-child(5) { display: none; }
      .input-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="portal-top-bar">
    <a href="portal.html"><img src="assets/booksuite-logo.PNG" alt="BookSuite logo" class="logo small" /></a>
    <div class="portal-user">
      <span class="user-name" id="userName">Loading...</span>
      <span class="user-company" id="companyCode">Loading...</span>
    </div>
    <a href="portal.html" class="logout-btn">← Portal</a>
  </header>

  <div class="section-body">
    <div class="page-header">
      <h2>💳 Payments</h2>
      <button class="add-btn" id="addPaymentBtn">+ Record Payment</button>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value" id="totalRevenue">$0.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">This Month</div>
        <div class="stat-value" id="monthRevenue">$0.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Paid</div>
        <div class="stat-value" id="paidCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Unpaid</div>
        <div class="stat-value" id="unpaidCount" style="color:#ffc107">0</div>
      </div>
    </div>

    <input type="text" class="search-bar" id="searchBar" placeholder="Search payments by client, service, or method..." />

    <div class="table-wrap" style="overflow-x:auto;-webkit-overflow-scrolling:touch;"><table class="data-table" id="paymentsTable" style="display:none;">
      <thead>
        <tr>
          <th>Client</th>
          <th>Service</th>
          <th>Amount</th>
          <th>Date</th>
          <th>Method</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="paymentsBody"></tbody>
    </table></div>

    <div class="empty-state" id="emptyState">
      <div class="icon">💳</div>
      <p>No payments recorded yet. Click "Record Payment" to add your first transaction.</p>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3 id="modalTitle">Record Payment</h3>
      <input type="hidden" id="editId" />
      <label>Client *</label>
      <select id="payClient"><option value="">Select client...</option></select>
      <label>Service</label>
      <select id="payService"><option value="">Select service...</option></select>
      <div class="input-row">
        <div>
          <label>Amount *</label>
          <input type="number" id="payAmount" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div>
          <label>Date</label>
          <input type="date" id="payDate" />
        </div>
      </div>
      <div class="input-row">
        <div>
          <label>Method</label>
          <select id="payMethod">
            <option value="Cash">Cash</option>
            <option value="Card">Card</option>
            <option value="Transfer">Transfer</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div>
          <label>Status</label>
          <select id="payStatus">
            <option value="Paid">Paid</option>
            <option value="Unpaid">Unpaid</option>
            <option value="Refunded">Refunded</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button class="cancel-btn" id="cancelBtn">Cancel</button>
        <button class="save-btn" id="saveBtn">Record</button>
      </div>
    </div>
  </div>

  <script src="theme.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBT_QHFaROmtmQQy4984zjJ7Xmust7TOho",
      authDomain: "booksuite-dtb.firebaseapp.com",
      projectId: "booksuite-dtb",
      storageBucket: "booksuite-dtb.firebasestorage.app",
      messagingSenderId: "587821555081",
      appId: "1:587821555081:web:e588609eedd6c924cdd558"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let companyId = null;
    let allPayments = [];

    function toast(msg, isError) {
      const t = document.createElement("div");
      t.className = "toast" + (isError ? " error" : "");
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "login.html"; return; }
      try {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
          const d = userDoc.data();
          companyId = d.companyId;
          document.getElementById("userName").textContent = d.name;
          const companyDoc = await getDoc(doc(db, "companies", d.companyId));
          if (companyDoc.exists()) document.getElementById("companyCode").textContent = "Company Code: " + companyDoc.data().companyCode;
          document.getElementById("payDate").value = new Date().toISOString().split("T")[0];
          loadDropdowns();
          loadPayments();
        } else { document.getElementById("userName").textContent = user.email; }
      } catch(e) { console.error(e); document.getElementById("userName").textContent = user.email; }
    });

    async function loadDropdowns() {
      const [clientSnap, serviceSnap] = await Promise.all([
        getDocs(query(collection(db, "clients"), where("companyId", "==", companyId))),
        getDocs(query(collection(db, "services"), where("companyId", "==", companyId)))
      ]);
      const cs = document.getElementById("payClient");
      clientSnap.forEach(d => { const o = document.createElement("option"); o.value = d.data().name; o.textContent = d.data().name; cs.appendChild(o); });
      const ss = document.getElementById("payService");
      serviceSnap.forEach(d => { const o = document.createElement("option"); o.value = d.data().name; o.textContent = d.data().name + (d.data().price ? " ($" + parseFloat(d.data().price).toFixed(2) + ")" : ""); ss.appendChild(o); });
    }

    async function loadPayments() {
      allPayments = [];
      const snap = await getDocs(query(collection(db, "payments"), where("companyId", "==", companyId)));
      snap.forEach(d => allPayments.push({ id: d.id, ...d.data() }));
      allPayments.sort((a, b) => {
        const da = a.date ? (a.date.seconds ? a.date.seconds * 1000 : new Date(a.date).getTime()) : 0;
        const db2 = b.date ? (b.date.seconds ? b.date.seconds * 1000 : new Date(b.date).getTime()) : 0;
        return db2 - da;
      });
      renderPayments();
    }

    function renderPayments() {
      const tbody = document.getElementById("paymentsBody");
      tbody.innerHTML = "";
      const q = document.getElementById("searchBar").value.toLowerCase();
      let filtered = allPayments;
      if (q) filtered = filtered.filter(p => (p.clientName || "").toLowerCase().includes(q) || (p.service || "").toLowerCase().includes(q) || (p.method || "").toLowerCase().includes(q));

      let total = 0, monthTotal = 0, paid = 0, unpaid = 0;
      const now = new Date();
      allPayments.forEach(p => {
        const amt = parseFloat(p.amount || 0);
        if ((p.status || "Paid") === "Paid") { total += amt; paid++; }
        else if ((p.status || "Paid") === "Unpaid") unpaid++;
        const pDate = p.date ? new Date(p.date.seconds ? p.date.seconds * 1000 : p.date) : null;
        if (pDate && pDate.getMonth() === now.getMonth() && pDate.getFullYear() === now.getFullYear() && (p.status || "Paid") === "Paid") monthTotal += amt;
      });
      document.getElementById("totalRevenue").textContent = "$" + total.toFixed(2);
      document.getElementById("monthRevenue").textContent = "$" + monthTotal.toFixed(2);
      document.getElementById("paidCount").textContent = paid;
      document.getElementById("unpaidCount").textContent = unpaid;

      if (filtered.length === 0) {
        document.getElementById("emptyState").style.display = "block";
        document.getElementById("paymentsTable").style.display = "none";
      } else {
        document.getElementById("emptyState").style.display = "none";
        document.getElementById("paymentsTable").style.display = "table";
        filtered.forEach(p => {
          const tr = document.createElement("tr");
          const amt = parseFloat(p.amount || 0);
          const pDate = p.date ? new Date(p.date.seconds ? p.date.seconds * 1000 : p.date) : null;
          const status = p.status || "Paid";
          tr.innerHTML = `
            <td><strong>${p.clientName || "—"}</strong></td>
            <td>${p.service || "—"}</td>
            <td>$${amt.toFixed(2)}</td>
            <td>${pDate ? pDate.toLocaleDateString() : "—"}</td>
            <td>${p.method || "—"}</td>
            <td><span class="badge ${status.toLowerCase()}" onclick="window._cycleStatus('${p.id}')" title="Click to cycle status">${status}</span></td>
            <td><div class="action-btns">
              <button onclick="window._editP('${p.id}')">Edit</button>
              <button class="del" onclick="window._delP('${p.id}')">Delete</button>
            </div></td>`;
          tbody.appendChild(tr);
        });
      }
    }

    document.getElementById("searchBar").addEventListener("input", () => renderPayments());

    const modal = document.getElementById("modal");
    function openModal(edit) {
      document.getElementById("modalTitle").textContent = edit ? "Edit Payment" : "Record Payment";
      document.getElementById("saveBtn").textContent = edit ? "Update" : "Record";
      modal.classList.add("active");
    }
    function closeModal() {
      modal.classList.remove("active");
      document.getElementById("editId").value = "";
      document.getElementById("payClient").value = "";
      document.getElementById("payService").value = "";
      document.getElementById("payAmount").value = "";
      document.getElementById("payDate").value = new Date().toISOString().split("T")[0];
      document.getElementById("payMethod").value = "Cash";
      document.getElementById("payStatus").value = "Paid";
    }
    document.getElementById("addPaymentBtn").addEventListener("click", () => openModal(false));
    document.getElementById("cancelBtn").addEventListener("click", closeModal);
    modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const clientName = document.getElementById("payClient").value;
      const service = document.getElementById("payService").value;
      const amount = document.getElementById("payAmount").value.trim();
      const date = document.getElementById("payDate").value;
      const method = document.getElementById("payMethod").value;
      const status = document.getElementById("payStatus").value;
      const editId = document.getElementById("editId").value;
      if (!clientName) { toast("Please select a client", true); return; }
      if (!amount || parseFloat(amount) < 0) { toast("Please enter a valid amount", true); return; }
      try {
        const data = { clientName, service, amount, date: date ? new Date(date) : new Date(), method, status, companyId };
        if (editId) {
          await setDoc(doc(db, "payments", editId), data, { merge: true });
          toast("Payment updated");
        } else {
          data.createdAt = new Date();
          await addDoc(collection(db, "payments"), data);
          toast("Payment recorded");
        }
        closeModal();
        await loadPayments();
      } catch(e) { toast("Error: " + e.message, true); }
    });

    window._editP = function(id) {
      const p = allPayments.find(x => x.id === id);
      if (!p) return;
      document.getElementById("editId").value = id;
      document.getElementById("payClient").value = p.clientName || "";
      document.getElementById("payService").value = p.service || "";
      document.getElementById("payAmount").value = p.amount || "";
      const pDate = p.date ? new Date(p.date.seconds ? p.date.seconds * 1000 : p.date) : null;
      document.getElementById("payDate").value = pDate ? pDate.toISOString().split("T")[0] : "";
      document.getElementById("payMethod").value = p.method || "Cash";
      document.getElementById("payStatus").value = p.status || "Paid";
      openModal(true);
    };

    window._delP = async function(id) {
      if (!confirm("Delete this payment record?")) return;
      try { await deleteDoc(doc(db, "payments", id)); toast("Payment deleted"); await loadPayments(); }
      catch(e) { toast("Error: " + e.message, true); }
    };

    window._cycleStatus = async function(id) {
      const p = allPayments.find(x => x.id === id);
      if (!p) return;
      const cycle = { "Paid": "Unpaid", "Unpaid": "Refunded", "Refunded": "Paid" };
      const next = cycle[p.status || "Paid"] || "Paid";
      try { await setDoc(doc(db, "payments", id), { status: next }, { merge: true }); p.status = next; renderPayments(); toast("Status → " + next); }
      catch(e) { toast("Error: " + e.message, true); }
    };
  </script>
</body>
</html>
