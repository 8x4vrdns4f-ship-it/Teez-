<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookSuite – Portal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- TOP BAR -->
    <header class="portal-top-bar">
      <img src="assets/booksuite-logo.PNG" alt="BookSuite logo" class="logo small" />

      <div class="portal-user">
        <span class="user-name">John Smith</span>
        <span class="user-company">Acme Barbers</span>
      </div>

      <a href="login.html" class="logout-btn">logout</a>
    </header>

    <!-- DASHBOARD -->
    <main class="portal">

      <!-- Dashboard Grid -->
      <div class="portal-grid" id="dashboard">
        <div class="portal-card" onclick="openSection('bookings')">📥 Bookings</div>
        <div class="portal-card" onclick="openSection('calendar')">📅 Calendar</div>
        <div class="portal-card" onclick="openSection('schedule')">🗓 Schedule</div>

        <div class="portal-card" onclick="openSection('staff')">👥 Staff</div>
        <div class="portal-card" onclick="openSection('clients')">👤 Clients</div>
        <div class="portal-card" onclick="openSection('services')">✂️ Services</div>

        <div class="portal-card" onclick="openSection('payments')">💳 Payments</div>
        <div class="portal-card" onclick="openSection('reports')">📊 Reports</div>
        <div class="portal-card" onclick="openSection('settings')">⚙️ Settings</div>
      </div>

      <!-- Hidden Sections -->
      <div class="portal-section" id="bookings">
        <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
        <h2>Bookings</h2>
      </div>

      <div class="portal-section" id="calendar">
        <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
        <h2>Calendar</h2>
      </div>

      <div class="portal-section" id="schedule">
        <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
        <h2>Schedule</h2>
      </div>

      <div class="portal-section" id="staff">
        <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
        <h2>Staff</h2>
      </div>

      <div class="portal-section" id="clients">
        <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
        <h2>Clients</h2>
      </div>

      <div class="portal-section" id="services">
        <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
        <h2>Services</h2>
      </div>

      <div class="portal-section" id="payments">
        <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
        <h2>Payments</h2>
      </div>

      <div class="portal-section" id="reports">
        <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
        <h2>Reports</h2>
      </div>

      <div class="portal-section" id="settings">
        <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
        <h2>Settings</h2>
      </div>

    </main>

    <script>
      function openSection(id) {
        document.getElementById("dashboard").style.display = "none";
        const sections = document.querySelectorAll(".portal-section");
        sections.forEach(section => section.style.display = "none");
        document.getElementById(id).style.display = "block";
      }

      function goBack() {
        const sections = document.querySelectorAll(".portal-section");
        sections.forEach(section => section.style.display = "none");
        document.getElementById("dashboard").style.display = "grid";
      }
    </script>

  </body>
</html>
