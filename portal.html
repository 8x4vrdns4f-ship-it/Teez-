<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookSuite – Portal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header class="portal-top-bar">
      <img src="assets/booksuite-logo.PNG" alt="BookSuite logo" class="logo small" />

      <div class="portal-user">
        <span class="user-name" id="userName">Loading...</span>
        <span class="user-company" id="companyCode">Loading...</span>
      </div>

      <a href="#" class="logout-btn">logout</a>
    </header>

    <main class="portal">
      <div class="portal-grid" id="dashboard">
        <div class="portal-card" onclick="openSection('bookings')">📥 Bookings</div>
        <div class="portal-card" onclick="openSection('calendar')">📅 Calendar</div>
        <div class="portal-card" onclick="openSection('schedule')">🗓 Schedule</div>
        <div class="portal-card" onclick="openSection('staff')">👥 Staff</div>
        <div class="portal-card" onclick="openSection('clients')">👤 Clients</div>
        <div class="portal-card" onclick="openSection('services')">✂️ Services</div>
        <div class="portal-card" onclick="openSection('payments')">💳 Payments</div>
        <div class="portal-card" onclick="openSection('reports')">📊 Reports</div>
        <div class="portal-card" onclick="openSection('settings')">⚙️ Settings</div>
      </div>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
      import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBT_QHFaROmtmQQy4984zjJ7Xmust7TOho",
        authDomain: "booksuite-dtb.firebaseapp.com",
        projectId: "booksuite-dtb",
        storageBucket: "booksuite-dtb.firebasestorage.app",
        messagingSenderId: "587821555081",
        appId: "1:587821555081:web:e588609eedd6c924cdd558"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.href = "login.html";
          return;
        }

        const userDoc = await getDoc(doc(db, "users", user.uid));

        if (userDoc.exists()) {
          const userData = userDoc.data();

          document.getElementById("userName").textContent = userData.name;

          const companyDoc = await getDoc(doc(db, "companies", userData.companyId));

          if (companyDoc.exists()) {
            const companyData = companyDoc.data();
            document.getElementById("companyCode").textContent =
              "Company Code: " + companyData.companyCode;
          }
        }
      });

      document.querySelector(".logout-btn").addEventListener("click", function(e){
        e.preventDefault();
        signOut(auth).then(() => {
          window.location.href = "login.html";
        });
      });
    </script>
  </body>
</html>
