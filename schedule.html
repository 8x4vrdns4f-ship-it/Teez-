<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookSuite – Schedule</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
    .page-header h2 { font-size: 28px; }
    .section-body { max-width: 1100px; margin: 0 auto; padding: 40px 48px; }
    .day-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .day-tab { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--bs-accent); background: transparent; color: var(--bs-accent); cursor: pointer; font-size: 13px; transition: 0.2s; }
    .day-tab:hover, .day-tab.active { background: var(--bs-accent); color: var(--bs-bg); }
    .schedule-grid { display: grid; grid-template-columns: 80px 1fr; gap: 0; margin-top: 20px; }
    .time-label { padding: 16px 12px; font-size: 13px; color: var(--bs-text-secondary); border-bottom: 1px solid var(--bs-border); text-align: right; padding-right: 16px; }
    .time-slot { padding: 12px 16px; border-bottom: 1px solid var(--bs-border); border-left: 1px solid var(--bs-border); min-height: 56px; cursor: pointer; transition: background 0.2s; position: relative; }
    .time-slot:hover { background: var(--bs-accent-glow); }
    .time-slot.blocked { background: rgba(239,68,68,0.08); border-left-color: #ef4444; }
    .time-slot.has-booking { background: rgba(34,197,94,0.06); border-left: 3px solid #22c55e; }
    .slot-booking { font-size: 13px; color: var(--bs-text); }
    .slot-booking .sb-client { font-weight: 600; }
    .slot-booking .sb-service { font-size: 12px; color: var(--bs-text-secondary); }
    .slot-blocked-label { font-size: 12px; color: #ef4444; font-style: italic; }
    .schedule-legend { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--bs-text-secondary); }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
    .legend-dot.booked { background: #22c55e; }
    .legend-dot.blocked { background: #ef4444; }
    .legend-dot.free { background: rgba(255,255,255,0.1); border: 1px solid var(--bs-input-border); }
    .toast { position: fixed; bottom: 30px; right: 30px; background: #16a34a; color: #fff; padding: 14px 24px; border-radius: 10px; font-size: 14px; z-index: 200; animation: slideIn 0.3s ease; }
    .toast.error { background: #ef4444; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .date-display { font-size: 14px; color: var(--bs-text-secondary); margin-bottom: 16px; }
    @media (max-width: 768px) {
      .section-body { padding: 20px 12px; }
      .schedule-grid { grid-template-columns: 60px 1fr; }
    }
  </style>
</head>
<body>
  <header class="portal-top-bar">
    <a href="portal.html"><img src="assets/booksuite-logo.PNG" alt="BookSuite logo" class="logo small" /></a>
    <div class="portal-user">
      <span class="user-name" id="userName">Loading...</span>
      <span class="user-company" id="companyCode">Loading...</span>
    </div>
    <a href="portal.html" class="logout-btn">← Portal</a>
  </header>

  <div class="section-body">
    <div class="page-header">
      <h2>🗓 Schedule</h2>
    </div>

    <div class="day-tabs" id="dayTabs"></div>
    <div class="date-display" id="dateDisplay"></div>
    <div class="schedule-grid" id="scheduleGrid"></div>

    <div class="schedule-legend">
      <div class="legend-item"><div class="legend-dot booked"></div> Booked</div>
      <div class="legend-item"><div class="legend-dot blocked"></div> Blocked</div>
      <div class="legend-item"><div class="legend-dot free"></div> Available</div>
    </div>
  </div>

  <script src="theme.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBT_QHFaROmtmQQy4984zjJ7Xmust7TOho",
      authDomain: "booksuite-dtb.firebaseapp.com",
      projectId: "booksuite-dtb",
      storageBucket: "booksuite-dtb.firebasestorage.app",
      messagingSenderId: "587821555081",
      appId: "1:587821555081:web:e588609eedd6c924cdd558"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let companyId = null;
    let allBookings = [];
    let blockedSlots = {};

    function toast(msg, isError) {
      const t = document.createElement("div");
      t.className = "toast" + (isError ? " error" : "");
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    function pad(n) { return n < 10 ? "0" + n : "" + n; }

    const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const tabsEl = document.getElementById("dayTabs");
    let selectedDay = new Date().getDay();

    function getSelectedDate() {
      const today = new Date();
      const diff = selectedDay - today.getDay();
      const d = new Date(today);
      d.setDate(d.getDate() + diff);
      return d;
    }

    function getDateStr() {
      const d = getSelectedDate();
      return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
    }

    // Build day tabs
    days.forEach((day, i) => {
      const btn = document.createElement("button");
      btn.className = "day-tab" + (i === selectedDay ? " active" : "");
      btn.textContent = day.slice(0, 3);
      btn.addEventListener("click", () => {
        selectedDay = i;
        tabsEl.querySelectorAll(".day-tab").forEach(t => t.classList.remove("active"));
        btn.classList.add("active");
        renderSchedule();
      });
      tabsEl.appendChild(btn);
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "login.html"; return; }
      try {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
          const d = userDoc.data();
          companyId = d.companyId;
          document.getElementById("userName").textContent = d.name;
          const companyDoc = await getDoc(doc(db, "companies", d.companyId));
          if (companyDoc.exists()) document.getElementById("companyCode").textContent = "Company Code: " + companyDoc.data().companyCode;
          // Load bookings
          const snap = await getDocs(query(collection(db, "bookings"), where("companyId", "==", companyId)));
          snap.forEach(d => allBookings.push({ id: d.id, ...d.data() }));
          // Load blocked slots
          try {
            const blockedDoc = await getDoc(doc(db, "scheduleBlocks", companyId));
            if (blockedDoc.exists()) blockedSlots = blockedDoc.data().slots || {};
          } catch(e) { console.error(e); }
          renderSchedule();
        } else {
          document.getElementById("userName").textContent = user.email;
          renderSchedule();
        }
      } catch(e) {
        console.error(e);
        document.getElementById("userName").textContent = user.email;
        renderSchedule();
      }
    });

    function renderSchedule() {
      const grid = document.getElementById("scheduleGrid");
      grid.innerHTML = "";
      const dateStr = getDateStr();
      const d = getSelectedDate();
      const opts = { weekday: "long", year: "numeric", month: "long", day: "numeric" };
      document.getElementById("dateDisplay").textContent = d.toLocaleDateString("en-US", opts);
      const dayBookings = allBookings.filter(b => b.date === dateStr);

      for (let h = 7; h <= 21; h++) {
        for (let m = 0; m < 60; m += 30) {
          const timeStr = pad(h) + ":" + pad(m);
          const hr = h > 12 ? h - 12 : (h === 0 ? 12 : h);
          const ampm = h >= 12 ? "PM" : "AM";
          const displayTime = hr + ":" + pad(m) + " " + ampm;
          const slotKey = dateStr + "_" + timeStr;

          const label = document.createElement("div");
          label.className = "time-label";
          label.textContent = displayTime;
          grid.appendChild(label);

          const slot = document.createElement("div");
          slot.className = "time-slot";

          // Check if booked
          const booking = dayBookings.find(b => b.time === timeStr);
          if (booking) {
            slot.classList.add("has-booking");
            slot.innerHTML = `<div class="slot-booking"><span class="sb-client">${booking.clientName || "—"}</span> <span class="sb-service">— ${booking.service || ""}</span></div>`;
          } else if (blockedSlots[slotKey]) {
            slot.classList.add("blocked");
            slot.innerHTML = '<div class="slot-blocked-label">Blocked</div>';
            slot.addEventListener("click", async () => {
              if (!companyId) return;
              delete blockedSlots[slotKey];
              try {
                await setDoc(doc(db, "scheduleBlocks", companyId), { slots: blockedSlots }, { merge: true });
                toast("Slot unblocked");
                renderSchedule();
              } catch(e) { toast("Error: " + e.message, true); }
            });
          } else {
            slot.addEventListener("click", async () => {
              if (!companyId) return;
              if (!confirm("Block " + displayTime + "?")) return;
              blockedSlots[slotKey] = true;
              try {
                await setDoc(doc(db, "scheduleBlocks", companyId), { slots: blockedSlots }, { merge: true });
                toast("Slot blocked");
                renderSchedule();
              } catch(e) { toast("Error: " + e.message, true); }
            });
          }

          grid.appendChild(slot);
        }
      }
    }
  </script>
</body>
</html>
