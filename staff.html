<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookSuite – Staff</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
    .page-header h2 { font-size: 28px; }
    .section-body { max-width: 1100px; margin: 0 auto; padding: 40px 48px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .staff-count { font-size: 14px; color: var(--bs-text-secondary); }
    .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .staff-card { background: var(--bs-surface); border: 1px solid var(--bs-border); border-radius: 14px; padding: 28px 20px; text-align: center; transition: transform 0.2s, box-shadow 0.2s; position: relative; }
    .staff-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px var(--bs-accent-glow); }
    .staff-avatar { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, var(--bs-accent), var(--bs-accent-hover)); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: var(--bs-bg); margin: 0 auto 14px; }
    .staff-name { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
    .staff-role { font-size: 13px; color: var(--bs-text-secondary); }
    .staff-email { font-size: 12px; color: var(--bs-accent); margin-top: 8px; word-break: break-all; }
    .staff-phone { font-size: 12px; color: var(--bs-text-secondary); margin-top: 4px; }
    .card-actions { display: flex; gap: 6px; justify-content: center; margin-top: 14px; }
    .card-actions button { background: transparent; border: 1px solid var(--bs-input-border); color: var(--bs-text-secondary); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; }
    .card-actions button:hover { border-color: var(--bs-accent); color: var(--bs-accent); }
    .card-actions button.del:hover { border-color: #ef4444; color: #ef4444; }
    .add-btn { background: var(--bs-accent); color: var(--bs-bg); border: none; padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .add-btn:hover { background: var(--bs-accent-hover); }
    .empty-state { text-align: center; padding: 80px 20px; color: var(--bs-text-secondary); }
    .empty-state .icon { font-size: 56px; margin-bottom: 16px; }
    .empty-state p { font-size: 16px; margin-bottom: 24px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--bs-modal-bg); border: 1px solid var(--bs-input-border); border-radius: 16px; padding: 32px; width: 90%; max-width: 420px; }
    .modal h3 { margin-bottom: 20px; font-size: 20px; }
    .modal label { display: block; font-size: 13px; color: var(--bs-text-secondary); margin-bottom: 6px; margin-top: 14px; }
    .modal input, .modal select { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--bs-input-border); background: var(--bs-input-bg); color: var(--bs-text); font-size: 14px; box-sizing: border-box; }
    .modal input:focus, .modal select:focus { outline: none; border-color: var(--bs-accent); }
    .modal select option { background: var(--bs-modal-bg); }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
    .modal-actions button { flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; font-weight: 600; }
    .modal-actions .cancel-btn { background: transparent; border: 1px solid var(--bs-input-border); color: var(--bs-text-secondary); }
    .modal-actions .save-btn { background: var(--bs-accent); color: var(--bs-bg); }
    .toast { position: fixed; bottom: 30px; right: 30px; background: #16a34a; color: #fff; padding: 14px 24px; border-radius: 10px; font-size: 14px; z-index: 200; animation: slideIn 0.3s ease; }
    .toast.error { background: #ef4444; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .search-bar { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--bs-input-border); background: var(--bs-surface); color: var(--bs-text); font-size: 14px; margin-bottom: 20px; box-sizing: border-box; }
    .search-bar:focus { outline: none; border-color: var(--bs-accent); }
    .search-bar::placeholder { color: var(--bs-muted); }
    @media (max-width: 768px) { .section-body { padding: 20px 16px; } }
  </style>
</head>
<body>
  <header class="portal-top-bar">
    <a href="portal.html"><img src="assets/booksuite-logo.PNG" alt="BookSuite logo" class="logo small" /></a>
    <div class="portal-user">
      <span class="user-name" id="userName">Loading...</span>
      <span class="user-company" id="companyCode">Loading...</span>
    </div>
    <a href="portal.html" class="logout-btn">← Portal</a>
  </header>

  <div class="section-body">
    <div class="page-header">
      <h2>👥 Staff</h2>
      <div class="header-right">
        <span class="staff-count" id="staffCount"></span>
        <button class="add-btn" id="addStaffBtn">+ Add Staff</button>
      </div>
    </div>

    <input type="text" class="search-bar" id="searchBar" placeholder="Search staff by name, role, or email..." />

    <div class="staff-grid" id="staffGrid"></div>

    <div class="empty-state" id="emptyState">
      <div class="icon">👥</div>
      <p>No staff members yet. Add your team to manage schedules and assignments.</p>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3 id="modalTitle">Add Staff Member</h3>
      <input type="hidden" id="editId" />
      <label>Name *</label>
      <input type="text" id="staffName" placeholder="Full name" />
      <label>Email</label>
      <input type="email" id="staffEmail" placeholder="staff@email.com" />
      <label>Phone</label>
      <input type="tel" id="staffPhone" placeholder="+1 234 567 8900" />
      <label>Role</label>
      <select id="staffRole">
        <option value="Staff">Staff</option>
        <option value="Barber">Barber</option>
        <option value="Stylist">Stylist</option>
        <option value="Therapist">Therapist</option>
        <option value="Manager">Manager</option>
        <option value="Other">Other</option>
      </select>
      <div class="modal-actions">
        <button class="cancel-btn" id="cancelBtn">Cancel</button>
        <button class="save-btn" id="saveBtn">Add</button>
      </div>
    </div>
  </div>

  <script src="theme.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBT_QHFaROmtmQQy4984zjJ7Xmust7TOho",
      authDomain: "booksuite-dtb.firebaseapp.com",
      projectId: "booksuite-dtb",
      storageBucket: "booksuite-dtb.firebasestorage.app",
      messagingSenderId: "587821555081",
      appId: "1:587821555081:web:e588609eedd6c924cdd558"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let companyId = null;
    let allStaff = [];

    function toast(msg, isError) {
      const t = document.createElement("div");
      t.className = "toast" + (isError ? " error" : "");
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "login.html"; return; }
      try {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
          const d = userDoc.data();
          companyId = d.companyId;
          document.getElementById("userName").textContent = d.name;
          const companyDoc = await getDoc(doc(db, "companies", d.companyId));
          if (companyDoc.exists()) document.getElementById("companyCode").textContent = "Company Code: " + companyDoc.data().companyCode;
          loadStaff();
        } else {
          document.getElementById("userName").textContent = user.email;
        }
      } catch(e) { console.error(e); document.getElementById("userName").textContent = user.email; }
    });

    async function loadStaff() {
      allStaff = [];
      const snap = await getDocs(query(collection(db, "staff"), where("companyId", "==", companyId)));
      snap.forEach(d => allStaff.push({ id: d.id, ...d.data() }));
      allStaff.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
      renderStaff();
    }

    function renderStaff() {
      const grid = document.getElementById("staffGrid");
      grid.innerHTML = "";
      const q = document.getElementById("searchBar").value.toLowerCase();
      let filtered = allStaff;
      if (q) filtered = filtered.filter(s => (s.name || "").toLowerCase().includes(q) || (s.role || "").toLowerCase().includes(q) || (s.email || "").toLowerCase().includes(q));
      document.getElementById("staffCount").textContent = filtered.length + " member" + (filtered.length !== 1 ? "s" : "");
      if (filtered.length === 0) {
        document.getElementById("emptyState").style.display = "block";
      } else {
        document.getElementById("emptyState").style.display = "none";
        filtered.forEach(s => {
          const initials = (s.name || "?").split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
          const card = document.createElement("div");
          card.className = "staff-card";
          card.innerHTML = `
            <div class="staff-avatar">${initials}</div>
            <div class="staff-name">${s.name}</div>
            <div class="staff-role">${s.role || "Staff"}</div>
            <div class="staff-email">${s.email || ""}</div>
            ${s.phone ? '<div class="staff-phone">' + s.phone + '</div>' : ''}
            <div class="card-actions">
              <button onclick="window._editS('${s.id}')">Edit</button>
              <button class="del" onclick="window._delS('${s.id}')">Delete</button>
            </div>`;
          grid.appendChild(card);
        });
      }
    }

    document.getElementById("searchBar").addEventListener("input", () => renderStaff());

    const modal = document.getElementById("modal");
    function openModal(edit) {
      document.getElementById("modalTitle").textContent = edit ? "Edit Staff" : "Add Staff Member";
      document.getElementById("saveBtn").textContent = edit ? "Update" : "Add";
      modal.classList.add("active");
    }
    function closeModal() {
      modal.classList.remove("active");
      document.getElementById("editId").value = "";
      document.getElementById("staffName").value = "";
      document.getElementById("staffEmail").value = "";
      document.getElementById("staffPhone").value = "";
      document.getElementById("staffRole").value = "Staff";
    }
    document.getElementById("addStaffBtn").addEventListener("click", () => openModal(false));
    document.getElementById("cancelBtn").addEventListener("click", closeModal);
    modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const name = document.getElementById("staffName").value.trim();
      const email = document.getElementById("staffEmail").value.trim();
      const phone = document.getElementById("staffPhone").value.trim();
      const role = document.getElementById("staffRole").value;
      const editId = document.getElementById("editId").value;
      if (!name) { toast("Please enter a name", true); return; }
      try {
        const data = { name, email, phone, role, companyId };
        if (editId) {
          await setDoc(doc(db, "staff", editId), data, { merge: true });
          toast("Staff updated");
        } else {
          data.addedAt = new Date();
          await addDoc(collection(db, "staff"), data);
          toast("Staff added");
        }
        closeModal();
        await loadStaff();
      } catch(e) { toast("Error: " + e.message, true); }
    });

    window._editS = function(id) {
      const s = allStaff.find(x => x.id === id);
      if (!s) return;
      document.getElementById("editId").value = id;
      document.getElementById("staffName").value = s.name || "";
      document.getElementById("staffEmail").value = s.email || "";
      document.getElementById("staffPhone").value = s.phone || "";
      document.getElementById("staffRole").value = s.role || "Staff";
      openModal(true);
    };

    window._delS = async function(id) {
      if (!confirm("Remove this staff member?")) return;
      try { await deleteDoc(doc(db, "staff", id)); toast("Staff removed"); await loadStaff(); }
      catch(e) { toast("Error: " + e.message, true); }
    };
  </script>
</body>
</html>
