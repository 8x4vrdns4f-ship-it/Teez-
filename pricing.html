<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Your Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: Inter, system-ui, sans-serif;
  background: radial-gradient(circle at top left, #0b1f3a, #020814 70%);
  color: #eaf2ff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 20px;
  margin: 0;
}

header.top-bar {
  width: 100%;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  padding: 20px 40px;
  box-sizing: border-box;
}

.logo {
  height: 180px; 
  object-fit: contain;
}

.login-link {
  color: #5ec2ff;
  text-decoration: none;
  font-weight: 500;
}

h1 { font-size: 3rem; text-align: center; margin-bottom: 10px; }
.subtitle { text-align: center; color: #aac6f0; margin-bottom: 60px; }

.pricing-wrapper { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; }

.pricing-card {
  background: #122344;
  border-radius: 15px;
  width: 300px;
  padding: 40px 30px;
  border: 1px solid #1b3050;
  position: relative;
  opacity: 0;
  transform: translateY(50px);
  transition: transform 0.6s ease, opacity 0.6s ease, border-color 0.3s;
}

.pricing-card:hover { transform: translateY(-10px); border-color: #3082b5; }

.pricing-card h2 { font-size: 1.8rem; margin-bottom: 10px; }
.price { font-size: 2.2rem; font-weight: 600; margin: 20px 0; }

.features { list-style: none; padding: 0; margin-bottom: 10px; }
.features li { margin-bottom: 12px; color: #b0c9e6; }

.extra-features {
  display: none;
}

.expand-toggle {
  margin-bottom: 20px;
  font-size: 14px;
  color: #5ec2ff;
  cursor: pointer;
  user-select: none;
  transition: 0.3s;
}

.expand-toggle:hover {
  color: #ffffff;
}

button {
  width: 100%; padding: 12px; border: none; border-radius: 8px;
  font-weight: 600; cursor: pointer; transition: background 0.3s;
}

/* Tier Buttons */
.silver-btn { background: #1b3050; color: #eaf2ff; }
.silver-btn:hover { background: #30567a; }

.gold-card { background: #3082b5; transform: scale(1.05); }
.gold-card h2, .gold-card .price, .gold-card li { color: #eaf2ff; }
.gold-btn { background: #eaf2ff; color: #3082b5; }
.gold-btn:hover { background: #d1e4f8; }

.platinum-btn { background: #0a1828; border: 1px solid #7f99b0; color: #eaf2ff; }
.platinum-btn:hover { background: #0f2a4a; }

.most-popular {
  position: absolute; top: -12px; right: 20px;
  background: #eaf2ff; color: #3082b5;
  padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
}

/* Testimonials */
.testimonials {
  background: #1a2a42; color: #eaf2ff;
  padding: 60px 20px; border-radius: 15px;
  margin-top: 60px; max-width: 900px; width: 100%; text-align: center;
  opacity: 0; transform: translateY(50px); transition: opacity 0.6s ease, transform 0.6s ease;
}

.testimonials h3 { font-size: 2rem; margin-bottom: 20px; }

.testimonial-carousel { position: relative; overflow: hidden; margin-top: 30px; }
.testimonial { 
  display: none; 
  flex-direction: row;
  align-items: flex-start; 
  gap: 20px; 
  text-align: left; 
}
.testimonial.active { display: flex; }

.testimonial img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #eaf2ff;
  flex-shrink: 0;
}

.testimonial p { font-size: 1rem; max-width: 600px; color: #c3d4eb; margin: 0; }
.testimonial h4 { font-weight: 600; color: #aac6f0; margin: 0; }

/* FAQ */
.faq { max-width: 900px; width: 100%; margin-top: 60px; text-align: center; }
.faq h3 { font-size: 2rem; margin-bottom: 20px; }
.faq p { color: #b0c9e6; margin-bottom: 10px; }

.animate { opacity: 1 !important; transform: translateY(0px) !important; }

::-webkit-scrollbar { width: 13px; }
::-webkit-scrollbar-track { background: #79858f; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #3082b5, #020a10);
  box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
  transition: 0.3s ease;
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, #193c50, #021928);
}
</style>
</head>
<body>

<header class="top-bar">
  <a href="index.html"><img src="assets/booksuite-logo.PNG" class="logo"/></a> 
</header>

<h1>Select Your Growth Plan</h1>
<p class="subtitle">Monthly appointment setting packages designed to scale your business.</p>

<div class="pricing-wrapper">

  <!-- Silver -->
  <div class="pricing-card">
    <h2>Silver</h2>
    <div class="price">$199<span style="font-size:16px;">/month</span></div>

    <!-- (REST OF YOUR FILE CONTINUES 100% IDENTICAL) -->
